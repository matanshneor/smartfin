<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#141007">
    <title>SmartFin – שגיאה {{ code }}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-hero">
            <div class="auth-logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
                    <path d="M5 21L12.5 13.5L17.5 18.5L27 9" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M20 9H27V16" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="auth-app-name">SmartFin</h1>
            <p class="auth-tagline">שגיאה {{ code }}</p>
        </div>

        <div class="auth-form-card error-card">
            <p class="empty-icon">{% if code == 404 %}🔍{% else %}⚠️{% endif %}</p>
            <h2 class="auth-form-title">{{ code }}</h2>
            <p class="onboarding-sub error-message">{{ message }}</p>
            <a href="/" class="submit-btn">חזור לדף הראשי</a>
        </div>
    </div>
</body>
</html>
