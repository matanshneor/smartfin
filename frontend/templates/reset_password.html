<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#141007">
    <title>SmartFin – איפוס סיסמה</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-hero">
            <div class="auth-logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
                    <path d="M5 21L12.5 13.5L17.5 18.5L27 9" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M20 9H27V16" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="auth-app-name">SmartFin</h1>
            <p class="auth-tagline">קביעת סיסמה חדשה</p>
        </div>

        <div class="auth-form-card">
            <h2 class="auth-form-title">סיסמה חדשה</h2>

            <div class="alert alert-error" id="tokenError" style="display:none;">
                קישור האיפוס לא תקין או שפג תוקפו.
                <a href="{{ url_for('login') }}" class="auth-link">חזרה להתחברות</a>
            </div>

            <form class="auth-form" id="resetForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="newPassword">סיסמה חדשה (לפחות 6 תווים)</label>
                    <input class="form-input" type="password" id="newPassword"
                           placeholder="••••••••" required autocomplete="new-password" minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label" for="passwordConfirm">אימות סיסמה</label>
                    <input class="form-input" type="password" id="passwordConfirm"
                           placeholder="••••••••" required autocomplete="new-password" minlength="6">
                </div>

                <p class="form-error" id="resetError" role="alert"></p>

                <button type="submit" class="submit-btn" id="resetBtn">עדכן סיסמה</button>
            </form>
        </div>
    </div>

    <script>
    (function () {
        // הטוקן מגיע מהמייל של Supabase ב-fragment: #access_token=...&type=recovery
        const params      = new URLSearchParams(window.location.hash.slice(1));
        const accessToken = params.get('access_token');
        const form        = document.getElementById('resetForm');
        const errorBox    = document.getElementById('resetError');

        if (!accessToken) {
            document.getElementById('tokenError').style.display = 'block';
            form.style.display = 'none';
            return;
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            errorBox.textContent = '';

            const password = document.getElementById('newPassword').value;
            const confirm  = document.getElementById('passwordConfirm').value;

            if (password.length < 6) {
                errorBox.textContent = 'הסיסמה חייבת להכיל לפחות 6 תווים';
                return;
            }
            if (password !== confirm) {
                errorBox.textContent = 'הסיסמאות אינן תואמות';
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.textContent = 'מעדכן…';

            fetch('/api/auth/reset', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({
                    access_token: accessToken,
                    password: password,
                    password_confirm: confirm,
                }),
            })
            .then(r => r.json())
            .then(function (d) {
                if (d.error) {
                    errorBox.textContent = d.error;
                    btn.disabled = false;
                    btn.textContent = 'עדכן סיסמה';
                    return;
                }
                window.location.href = '/login?reset=1';
            })
            .catch(function () {
                errorBox.textContent = 'שגיאת רשת — נסה שוב';
                btn.disabled = false;
                btn.textContent = 'עדכן סיסמה';
            });
        });
    })();
    </script>

</body>
</html>
